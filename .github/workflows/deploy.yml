name: Deploy to Vercel (production)

# Despliega el dashboard a producción en cada push a main.
# Requiere un único secreto en el repo: VERCEL_TOKEN
# (GitHub -> Settings -> Secrets and variables -> Actions -> New repository secret)

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

env:
  VERCEL_ORG_ID: team_NisY5NEZ25DUiWt2EXVWzKzq
  VERCEL_PROJECT_ID: prj_pTMTBGM0U2LWxeNS1g9zX8Ag2dI6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (producción)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (con la config de tu proyecto Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy a producción
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
