name: Deploy to GitHub Pages

# Despliegue autónomo: compila y publica el dashboard en GitHub Pages.
# No requiere ningún token ni servicio externo — usa el GITHUB_TOKEN automático.
# URL resultante: https://brunovignati.github.io/bvs-dashboard/

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build (base = /bvs-dashboard/)
        env:
          GH_PAGES: "true"
        run: npx vite build
      - name: SPA fallback (404 = index)
        run: cp dist/index.html dist/404.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
